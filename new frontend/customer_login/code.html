<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#5e5f5f",
                        "primary-fixed-dim": "#d4d4d4",
                        "surface-container-high": "#1f2020",
                        "surface-container-lowest": "#000000",
                        "error-dim": "#bb5551",
                        "primary-dim": "#b9b9b9",
                        "surface-container-low": "#131313",
                        "tertiary-fixed": "#f4f3f3",
                        "secondary-container": "#3b3b3b",
                        "on-surface-variant": "#acabaa",
                        "on-secondary-fixed": "#3f3f3f",
                        "tertiary-dim": "#ebebeb",
                        "surface": "#0e0e0e",
                        "inverse-surface": "#fcf9f8",
                        "primary-container": "#464747",
                        "surface-bright": "#2c2c2c",
                        "background": "#0e0e0e",
                        "on-primary-fixed-variant": "#5a5c5c",
                        "surface-dim": "#0e0e0e",
                        "error": "#ee7d77",
                        "on-surface": "#e7e5e4",
                        "surface-tint": "#c6c6c6",
                        "surface-variant": "#252626",
                        "on-secondary": "#202020",
                        "on-error-container": "#ff9993",
                        "secondary": "#9f9d9d",
                        "on-tertiary-container": "#555757",
                        "on-primary-container": "#d0d0d0",
                        "secondary-fixed": "#e4e2e2",
                        "primary": "#c6c6c6",
                        "primary-fixed": "#e3e2e2",
                        "secondary-fixed-dim": "#d6d4d4",
                        "on-secondary-fixed-variant": "#5c5b5b",
                        "error-container": "#7f2927",
                        "tertiary": "#f9f9f9",
                        "on-primary": "#3f4041",
                        "on-tertiary-fixed-variant": "#656667",
                        "surface-container": "#191a1a",
                        "on-tertiary-fixed": "#484a4a",
                        "on-error": "#490106",
                        "tertiary-fixed-dim": "#e5e5e5",
                        "on-background": "#e7e5e4",
                        "secondary-dim": "#9f9d9d",
                        "inverse-on-surface": "#565555",
                        "inverse-primary": "#5e5f5f",
                        "outline-variant": "#484848",
                        "surface-container-highest": "#252626",
                        "on-secondary-container": "#c0bfbe",
                        "tertiary-container": "#ebebeb",
                        "outline": "#767575",
                        "on-primary-fixed": "#3e3f40"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(37, 38, 38, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(72, 72, 72, 0.2);
        }
        .metallic-shimmer {
            background: linear-gradient(135deg, #c6c6c6 0%, #464747 100%);
            position: relative;
            overflow: hidden;
        }
        .metallic-shimmer::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.1) 50%, transparent 55%);
            transform: rotate(45deg);
        }
        .input-underline-focus:focus-within .line-draw {
            width: 100%;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden">
<!-- Top Navigation Anchor (Manual suppression of links for login context) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center w-full px-12 py-8 bg-transparent">
<div class="flex flex-col">
<span class="text-2xl font-headline tracking-widest uppercase text-stone-100 dark:text-stone-200">Obsidian Portal</span>
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant mt-1">Customer Portal</span>
</div>
<div class="hidden md:flex items-center gap-6">
<span class="material-symbols-outlined text-stone-300 dark:text-stone-400 cursor-pointer hover:text-stone-100 transition-all duration-300">language</span>
</div>
</header>
<main class="min-h-screen flex flex-col md:flex-row">
<!-- Left: Cinematic Hero -->
<section class="relative w-full md:w-1/2 h-64 md:h-screen overflow-hidden">
<img alt="Luxury dark sports car cinematic lighting" class="absolute inset-0 w-full h-full object-cover" data-alt="Cinematic shot of a luxury dark vehicle in shadow" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC6Wepar14fgty3Dz7Yyv93Icl0qOOzkRcCC1e5KKz5BT435F9KpMLy_gulRX2G8pc9_XynfHTK9_UCr0aM_PxbFZyW5duRLU5VBAx3ta-0AW-xc7vKTa0Ovo7Mr0pxDcFATAWMqAZUwiQ2_JThChvEmp5oFiF09vnamhI8D9F7OLEMpzM4g_E5naupj5lUsxvV-nuoIPmyMIC2f61AOb_aG-3xqzsg3yRuz40cr8md2jWTteezxZfJxzU_AiTehh0IUFxrWR-Utwm1"/>
<!-- Dark Gradient Overlay -->
<div class="absolute inset-0 bg-gradient-to-r from-background via-transparent to-transparent opacity-80 md:opacity-100"></div>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
<!-- Tagline -->
<div class="absolute bottom-12 md:bottom-auto md:top-1/2 md:-translate-y-1/2 left-12 max-w-md">
<h1 class="font-headline italic text-4xl md:text-6xl text-stone-100 tracking-tighter leading-tight">
                    The intersection of <br/>
<span class="text-primary-dim">engineering &amp; art.</span>
</h1>
<p class="font-label text-sm uppercase tracking-widest text-on-surface-variant mt-6">Defined by the shadows we cast.</p>
</div>
</section>
<!-- Right: Login Form Area -->
<section class="w-full md:w-1/2 h-full bg-surface-dim flex items-center justify-center p-6 md:p-12 relative">
<!-- Recessed Architectural Layer -->
<div class="absolute inset-0 bg-surface-container-low opacity-50"></div>
<!-- Login Card -->
<div class="glass-card relative z-10 w-full max-w-md p-10 rounded-lg shadow-2xl">
<div class="mb-12">
<h2 class="font-headline text-3xl text-stone-100 mb-2">Access Portal</h2>
<p class="font-body text-on-surface-variant text-sm">Enter your credentials to manage your collection.</p>
</div>
<form class="space-y-10">
<!-- Email Field -->
<div class="relative group input-underline-focus">
<label class="block font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-1">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 text-stone-100 focus:ring-0 focus:border-primary transition-colors font-body placeholder-stone-700" placeholder="name@exclusive.com" type="email"/>
<div class="line-draw absolute bottom-0 left-0 h-[1px] bg-primary w-0 transition-all duration-500 ease-in-out"></div>
</div>
<!-- Password Field -->
<div class="relative group input-underline-focus">
<label class="block font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-1">Passcode</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 text-stone-100 focus:ring-0 focus:border-primary transition-colors font-body placeholder-stone-700" placeholder="••••••••" type="password"/>
<div class="line-draw absolute bottom-0 left-0 h-[1px] bg-primary w-0 transition-all duration-500 ease-in-out"></div>
</div>
<!-- Actions -->
<div class="space-y-4 pt-4">
<button class="metallic-shimmer w-full py-4 px-6 flex items-center justify-center gap-3 text-on-primary font-label font-semibold uppercase tracking-[0.15em] text-xs rounded hover:opacity-90 transition-opacity active:scale-[0.98] duration-200" type="submit">
                            Sign In
                            <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<button class="w-full py-4 px-6 border border-outline/20 text-primary font-label text-[10px] uppercase tracking-[0.2em] rounded hover:bg-surface-bright/20 transition-colors" type="button">
                            Use demo credentials
                        </button>
</div>
<div class="flex justify-between items-center pt-4">
<a class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" href="#">Forgot passcode?</a>
<a class="font-label text-[10px] uppercase tracking-widest text-primary hover:underline underline-offset-4" href="#">Request Access</a>
</div>
</form>
</div>
</section>
</main>
<!-- Footer Anchor -->
<footer class="fixed bottom-0 w-full flex flex-row justify-between items-center px-12 py-6 w-full bg-stone-950/80 dark:bg-stone-950/90 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xs" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="font-sans uppercase tracking-[0.2em] text-[10px] text-stone-500 dark:text-stone-600">SECURE ENTERPRISE ACCESS</span>
</div>
<div class="flex gap-8">
<a class="font-sans uppercase tracking-[0.2em] text-[10px] text-stone-600 hover:text-stone-200 transition-colors" href="#">Privacy Policy</a>
<a class="font-sans uppercase tracking-[0.2em] text-[10px] text-stone-600 hover:text-stone-200 transition-colors" href="#">Legal</a>
</div>
</footer>
</body></html>
